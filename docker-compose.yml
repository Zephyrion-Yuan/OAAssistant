services:
  megant:
    build: .
    image: megant-oa-pdm-automation:local
    shm_size: "1gb"
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      NOVNC_PORT: 7900
      VNC_PORT: 5900
      MEGANT_DOCKER: "1"
      MEGANT_EDGE_PROFILE_MODE: isolated
      MEGANT_BROWSER_CHANNEL: msedge
      MEGANT_BROWSER_ARGS: --no-sandbox,--disable-dev-shm-usage
    ports:
      - "8787:8787"
      - "7900:7900"
    volumes:
      - megant-runtime:/app/.runtime

volumes:
  megant-runtime:
